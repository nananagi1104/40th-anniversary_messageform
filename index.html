<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>応援メッセージ投稿フォーム</title>
  <style>
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: #f7f7f7;
      margin: 0;
    }

    .wrapper {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    .badge {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 5px;
      margin-left: 8px;
    }

    .required {
      background: #ff4d4f;
      color: white;
    }

    .optional {
      background: #90a4ae;
      color: white;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
    }

    .radio-box {
      display: flex;
      gap: 40px;
    }

    .radio-box label {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .radio-box input {
      transform: scale(1.2);
    }

    button {
      width: 100%;
      background: #20a4b8;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      position: relative;
      z-index: 10;
    }

    button:hover {
      opacity: 0.9;
    }

    .success-message {
      text-align: center;
      font-size: 18px;
      color: green;
      font-weight: bold;
      display: none;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <h1>応援メッセージ投稿フォーム</h1>

  <form id="myForm">
    <!-- 氏名 -->
    <div class="form-group">
      <label>氏名 <span class="badge required">必須</span></label>
      <input type="text" name="entry.2079323008" placeholder="山田 太郎" required>
    </div>

    <!-- メール -->
    <div class="form-group">
      <label>メールアドレス <span class="badge required">必須</span></label>
      <input type="email" name="entry.8506932" placeholder="mail@example.com" required>
    </div>

    <!-- 所属 -->
    <div class="form-group">
      <label>所属 <span class="badge required">必須</span></label>
      <div class="radio-box">
        <label><input type="radio" name="entry.1143568180" value="コンサルティングスタッフ" required> コンサルティングスタッフ</label>
        <label><input type="radio" name="entry.1143568180" value="サポーティングスタッフ" required> サポーティングスタッフ</label>
      </div>
    </div>

    <!-- 入社年 -->
    <div class="form-group">
      <label>入社年 <span class="badge required">必須</span></label>
      <select name="entry.83428756" required>
        <option value="">選択してください</option>
        <option>1995</option><option>1996</option><option>1997</option><option>1998</option>
        <option>1999</option><option>2000</option><option>2001</option><option>2002</option>
        <option>2003</option><option>2004</option><option>2005</option><option>2006</option>
        <option>2007</option><option>2008</option><option>2009</option><option>2010</option>
        <option>2011</option><option>2012</option><option>2013</option><option>2014</option>
        <option>2015</option><option>2016</option><option>2017</option><option>2018</option>
        <option>2019</option><option>2020</option><option>2021</option><option>2022</option>
        <option>2023</option><option>2024</option><option>2025</option><option>2026</option>
      </select>
    </div>

    <!-- 退社年 -->
    <div class="form-group">
      <label>退社年 <span class="badge required">必須</span></label>
      <select name="entry.1013753232" required>
        <option value="">選択してください</option>
        <option>1995</option><option>1996</option><option>1997</option><option>1998</option>
        <option>1999</option><option>2000</option><option>2001</option><option>2002</option>
        <option>2003</option><option>2004</option><option>2005</option><option>2006</option>
        <option>2007</option><option>2008</option><option>2009</option><option>2010</option>
        <option>2011</option><option>2012</option><option>2013</option><option>2014</option>
        <option>2015</option><option>2016</option><option>2017</option><option>2018</option>
        <option>2019</option><option>2020</option><option>2021</option><option>2022</option>
        <option>2023</option><option>2024</option><option>2025</option><option>2026</option>
      </select>
    </div>

    <!-- 経歴 -->
    <div class="form-group">
      <label>退社後略歴 / 現所属 <span class="badge required">必須</span></label>
      <textarea name="entry.1555634786" required rows="3" placeholder="例：〇〇株式会社 → △△会社"></textarea>
    </div>

    <!-- タイトル -->
    <div class="form-group">
      <label>応援メッセージタイトル <span class="badge optional">任意</span></label>
      <input type="text" name="entry.2121020883">
    </div>

    <!-- 本文 -->
    <div class="form-group">
      <label>応援メッセージ本文 <span class="badge required">必須</span></label>
      <textarea name="entry.192152360" required rows="5"></textarea>
    </div>

    <button type="submit">回答する</button>
  </form>

  <div class="success-message" id="successMessage">
    送信が完了しました！ありがとうございます。
  </div>
</div>

<script>
  const form = document.getElementById('myForm');
  const success = document.getElementById('successMessage');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const url = "https://docs.google.com/forms/d/e/1FAIpQLSdGJZWt-93YMYYefN2bBK1kmXZpijWSLK-l64NF6qEQIdXqtQ/formResponse";
    const data = new FormData(form);

    fetch(url, {
      method: "POST",
      mode: "no-cors",
      body: data
    }).then(() => {
      form.style.display = "none";
      success.style.display = "block";
    }).catch(() => {
      alert("送信中にエラーが発生しました。もう一度お試しください。");
    });
  });
</script>

</body>
</html>
